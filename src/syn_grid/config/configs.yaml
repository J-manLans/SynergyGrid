###########################
#    Run Configuration    #
###########################

grid_world_conf:
  # GridWorld settings:
  # - number of rows and columns
  # - max active resources on grid
  # - max tier of the tier type resources
  grid_rows: &grid_rows 5
  grid_cols: &grid_cols 5
  max_active_resources: 3
  max_tier: 1

renderer_conf:
  # Renderer settings:
  # - grid_rows / grid_cols: used to calculate display size and layout
  grid_rows: *grid_rows
  grid_cols: *grid_cols

droid_conf:
  # Droid settings:
  # - grid_rows / grid_cols: defines the grid the agent can move in
  # - starting_score: initial score of the agent
  grid_rows: *grid_rows
  grid_cols: *grid_cols
  starting_score: 40

negative_resource_conf:
  # Negative resource behavior:
  # - reward: penalty applied when interacting with the resource
  # - cool_down: number of steps before the resource can be reused
  reward: -3
  cool_down: 7

tier_resource_conf:
  # Tiered resource behavior:
  # - linear_reward_growth: if true, reward scales linearly instead of exponentially
  # - step_wise_scoring: if true, reward is given per correctly consumed tier instead of on chain break
  # - growth_factor: multiplier applied per tier increase
  # - base_reward: starting reward value at tier 0
  # - cool_down: number of steps before the resource can be reused
  linear_reward_growth: True
  step_wise_scoring: True
  growth_factor: 1.5
  base_reward: 3
  cool_down: 10

###########################
#    Obs Configuration    #
###########################

observation_handler:
  # Observation handler settings:
  # - grid_rows / grid_cols: fix the maximum observation space size for those variables
  # - max_steps: number of steps in an episode until truncated
  grid_rows: *grid_rows
  grid_cols: *grid_cols
  max_steps: 100

###########################
#   Agent Configuration   #
###########################
