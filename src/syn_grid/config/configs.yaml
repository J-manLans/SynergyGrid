###########################
#   Experiment Settings   #
###########################

snapshot:
  # Snapshot settings:
  # - enabled: whether to save a snapshot of the full config
  # - id: optional identifier used as part of the snapshot filename
  enabled: false
  id: ""

###########################
#   World Configuration   #
###########################

world:
  grid_world_conf:
    # GridWorld settings:
    # - number of rows and columns
    # - max active orbs on grid
    grid_rows: &grid_rows 5
    grid_cols: &grid_cols 5
    max_active_orbs: &max_active_orbs 3

  renderer_conf:
    # Renderer settings:
    # - grid_rows / grid_cols (set in grid_world_conf): used to calculate display size and layout
    grid_rows: *grid_rows
    grid_cols: *grid_cols

  droid_conf:
    # Droid settings:
    # - grid_rows / grid_cols (set in grid_world_conf): defines the grid the droid can move in
    # - starting_score: initial score of the droid
    # - step_penalty: the cost of moving around for the agent
    grid_rows: *grid_rows
    grid_cols: *grid_cols
    starting_score: 50
    step_penalty: -0.5

  orb_factory_conf:
    # Orbs manager settings:
    # - grid_rows / grid_cols (set in grid_world_conf): used to set orbs life span
    # - max_active_orbs: max active orbs on grid (set in grid_world_conf)
    # - max_tier: this is the highest tier that orbs can reach in this environment.
    # - each orb type can be enabled/disabled
    # - weight defines relative spawn frequency when multiple orbs are active
    grid_rows: *grid_rows
    grid_cols: *grid_cols
    max_active_orbs: *max_active_orbs
    max_tier: &max_tier 3
    types:
      negative:
        enabled: false
        weight: 1
      tier:
        enabled: true
        weight: 2

  negative_orb_conf:
    # Negative orb behavior:
    # - reward: penalty applied when interacting with the orb
    # - cool_down: number of steps before the orb can be reused
    reward: -3.0
    cool_down: 10

  tier_orb_conf:
    # Tiered orb behavior:
    # - linear_reward_growth: if true, reward scales linearly instead of exponentially
    # - step_wise_scoring: if true, reward is given per correctly consumed tier instead of on chain break
    # - growth_factor: multiplier applied per tier increase
    # - base_reward: starting reward value at tier 0
    # - cool_down: number of steps before the orb can be reused
    linear_reward_growth: false
    step_wise_scoring: true
    growth_factor: 1.7
    base_reward: 1.5
    cool_down: 7

###########################
#    Obs Configuration    #
###########################

obs:
  observation_handler:
    # - modality: decides what type of observation the agent get. vector, composite and spatial are the options
    # - difficulty: decides how much information to pack into the agents observation. Hard, medium and easy are the options
    # - grid_rows / grid_cols (set in grid_world_conf): fix the maximum observation space size for those variables
    # - max_steps: number of steps in an episode until truncated
    modality: "vector"
    difficulty: "medium"
    max_steps: &max_steps 100

  modality_conf:
    # - grid_rows / grid_cols (set in grid_world_conf): fix the maximum observation space size for those variables
    grid_rows: *grid_rows
    grid_cols: *grid_cols
    max_active_orbs: *max_active_orbs


  medium_difficulty:
    # - max_score: set per scenario based on expected achievable score in this setup
    # - max_steps (set in orb_factory_conf): number of steps in an episode until truncated
    # - max_tier (set in observation_handler): max tier of the tier type orbs
    # - grid_rows / grid_cols (set in grid_world_conf): fix the maximum observation space size for those variables
    max_score: &max_score 100
    max_steps: *max_steps
    max_tier: *max_tier
    grid_rows: *grid_rows
    grid_cols: *grid_cols

  hard_difficulty:
    # - max_curriculum_tier: defines how many tier channels are preallocated. Must be fixed per run to keep observation shape stable during training.
    # - max_tier (set in orb_factory_conf): max tier of the tier type orbs, used to make sure max_curriculum_tier isn't to low
    # - grid_rows / grid_cols (set in grid_world_conf): fix the maximum observation space size for those variables
    max_curriculum_tier: 10
    max_tier: *max_tier
    grid_rows: *grid_rows
    grid_cols: *grid_cols

###########################
#   Agent Configuration   #
###########################

agent:
  global_agent_conf:
    # Global settings:
    # - algorithm: which algorithm the agent will use
    # - agent_steps: identifier for the model to continue training or evaluate
    # - identifier: name of the model checkpoints that will be saved
    # - human_control: allow human to control the game manually
    # - training: choose whether to train the agent or just run it
    algorithm_index: 0
    agent_steps: "2048000"
    identifier: "vector_tier_3"
    human_control: false
    training: false

  # Pick algorithm to train or evaluate
  train_agent_conf:
    # Train settings:
    # - continue_training: continue from a previously saved model
    # - enable_output: False if you are debugging or experimenting and only want to inspect behavior, not persist training
    # - render_mode (null or "human"): null is default, change to human if you want visual feedback during debugging
    # - timesteps: number of timesteps per iteration (a checkpoint is saved after this many steps)
    # - iterations: total number of training iterations
    continue_training: false
    enable_output: true
    render_mode: null
    timesteps: 20000
    iterations: 100

  eval_agent_conf:
    # Eval settings:
    # - trained_model: enable agent or use random sampling for debugging
    trained_model: true