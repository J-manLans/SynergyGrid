###########################
#   Experiment Settings   #
###########################

snapshot:
  # Snapshot settings:
  # - enabled: whether to save a snapshot of the full config for replicating scenario
  enabled: false

###########################
#   World Configuration   #
###########################

world:
  grid_world_conf:
    # GridWorld settings:
    # - number of rows and columns
    # - max active orbs on grid
    grid_rows: &grid_rows 5
    grid_cols: &grid_cols 5
    max_active_orbs: &max_active_orbs 3

  renderer_conf:
    # Renderer settings:
    # - grid_rows / grid_cols (set in grid_world_conf): used to calculate display size and layout
    # - img_assets: paths to graphic elements
    grid_rows: *grid_rows
    grid_cols: *grid_cols
    img_assets:
      droid_img: "assets/sprites/droid.png"
      positive_orb_img: "assets/sprites/positive_orb.png"
      negative_orb_img: "assets/sprites/negative_orb.png"
      floor_img: "assets/tiles/floor.png"
      hud_img: "assets/sprites/hud.png"

  droid_conf:
    # Droid settings:
    # - grid_rows / grid_cols (set in grid_world_conf): defines the grid the droid can move in
    # - starting_score: initial score of the droid
    # - step_penalty: the cost of moving around for the agent
    # - tier_consumption_penalty: punishment for consuming tier orbs in the wrong order
    grid_rows: *grid_rows
    grid_cols: *grid_cols
    starting_score: 10.0
    step_penalty: 0.0
    tier_consumption_penalty: -0.5

  orb_factory_conf:
    # Orbs manager settings:
    # - grid_rows / grid_cols (set in grid_world_conf): used to set orbs life span
    # - max_active_orbs (set in grid_world_conf): max active orbs on grid
    # - max_tier: this is the highest tier that orbs can reach in this environment
    # - de_spawn_tiers: decides if tiers should de spawn as the non tier orbs
    # - each orb type can be enabled/disabled
    # - weight defines relative spawn frequency when multiple orbs are active
    grid_rows: *grid_rows
    grid_cols: *grid_cols
    max_active_orbs: *max_active_orbs
    max_tier: &max_tier 2
    de_spawn_tiers: true
    types:
      negative:
        enabled: true
        weight: 1
      tier:
        enabled: true
        weight: 2

  negative_orb_conf:
    # Negative orb behavior:
    # - reward: penalty applied when interacting with the orb
    # - cool_down: number of steps before the orb can be reused
    reward: -3.0
    cool_down: 5

  tier_orb_conf:
    # Tiered orb behavior:
    # - linear_reward_growth: if true, reward scales linearly instead of exponentially
    # - step_wise_scoring: if true, reward is given per correctly consumed tier instead of on chain break
    # - growth_factor: multiplier applied per tier increase if linear_reward_growth is false
    # - base_reward: starting reward value at tier 0
    # - cool_down: number of steps before the orb can be reused
    linear_reward_growth: false
    step_wise_scoring: false
    growth_factor: 2.0
    base_reward: 5.0
    cool_down: 7

###########################
#    Obs Configuration    #
###########################

obs:
  observation_handler:
    # - perception: decides type and how much information to pack into the agents observation. Hard, medium and easy are the options
    # - max_steps: number of steps in an episode until truncated
    perception: "composite_medium"
    max_steps: &max_steps 100

  perception:
    # - max_score: set per scenario based on expected achievable score in this setup
    # - max_steps (set in orb_factory_conf): number of steps in an episode until truncated
    # - max_tier (set in observation_handler): max tier of the tier type orbs
    # - grid_rows / grid_cols (set in grid_world_conf): fix the maximum observation space size for those variables
    # - max_active_orbs (set in grid_world_conf): max active orbs on grid
    max_score: &max_score 100
    max_steps: *max_steps
    max_tier: *max_tier
    grid_rows: *grid_rows
    grid_cols: *grid_cols
    max_active_orbs: *max_active_orbs

###########################
#   Agent Configuration   #
###########################

agent:
  global_agent_conf:
    # Global settings:
    # - algorithm: which algorithm the agent will use
    # - agent_steps: identifier for the model to continue training or evaluate
    # - id_tag: (null if not applicable) used to tag your model so it can be easily found
    # - save_folder: (null for default) specify this if you want to have special folders for your experiments
    # - human_control: allow human to control the game manually, disables training and eval
    # - training: set to false to evaluate the agent
    # - check_env: set to true if you wanna control your changes in the environment didn't break anything obvious
    alg: "RPPO"
    agent_steps: "800000"
    id_tag: 'combo_reward'
    save_folder: 'rppo'
    human_control: false
    training: false
    check_env: false

  # Pick algorithm to train or evaluate
  train_agent_conf:
    # Train settings:
    # - continue_training: continue from a previously saved model
    # - monitor_output: False if you are debugging or experimenting and only want to inspect behavior, not persist results
    # - enable_output: False if you are debugging or experimenting and only want to inspect behavior, not persist results
    # - tensor_output: False if you are debugging or experimenting and only want to inspect behavior, not persist training
    # - model_output (null or "human"): null is default, change to human if you want visual feedback for debugging
    # - timesteps: number of timesteps per iteration (a checkpoint is saved after this many steps)
    # - iterations: total number of training iterations
    continue_training: false
    monitor_output: true
    tensorboard_output: true
    model_output: true
    render_mode: null
    timesteps: 400000
    iterations: 4

  eval_agent_conf:
    # Eval settings:
    # - num_eval_episodes: how many episodes to evaluate
    # - render_mode (null or "human"): set to null if you don't want visual feedback during evaluation
    num_eval_episodes: 1
    render_mode: 'human'
